<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png"> -->

  <title>Frontend Mentor | ** bootstrapped ** Fylo data storage component</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
  <!-- <link href="https://fonts.google.com/specimen/Raleway" rel="stylesheet"> -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <!-- <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style> -->
</head>

<body class="d-flex justify-content-center align-items-center">
  <div class="container">
    <div class="row justify-content-center align-items-center g-4">
      <div class="col-md-4">
        <div class="fylo-card logo-card p4">
          <img class="text-start" src="img/logo.svg" alt="fylo logo">

          <div class="icon-box text-white"></div>
          <div class="icon-box text-white"></div>
          <div class="icon-box text-white"></div>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="fylo-card p4 position-relative">

        <div class="storage-card rounded-3">

          <p class="text-white">You’ve used <strong>815 GB</strong> of your storage
          </p>
          <div class="progress bg-dark">
            <div class="progress-bar bg-danger" style="width:81%"></div>
          </div>

          <div class="d-flex justify-content-between text-white mt-2">
            <div class="storage-badge bg-white px-4 py-2 rounded"></div>

            <span>0 GB</span>
            <span>1000 GB</span>
          </div>
          <div class="storage-badge bg-white px-4 py-2 rounded">
            <strong>185</strong> GB Left
          </div>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
