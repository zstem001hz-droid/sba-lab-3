<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frontend Mentor | ** bootstrapped ** Fylo data storage component</title>

  <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> -->

  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.google.com/specimen/Raleway" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet" href="styles.css">

</head>

<body class="d-flex justify-content-center align-items-center">
  <div class="container">
    <div class="row justify-content-center align-items-center g-4">
      <div class="col-md-4">

        <div class="fylo-card logo-card p4 mb-4">
          <img src="img/logo.svg" alt="Fylo logo" class="fylo-logo mb-3">

          <div class="icon-row d-flex gap-3">

            <div class="icon-box">
              <img src="img/icon-document.svg" alt="document">
            </div>

            <div class="icon-box">
              <img src="img/icon-folder.svg" alt="folder">
            </div>

            <div class="icon-box">
              <img src="img/icon-upload.svg" alt="upload">
            </div>
          </div>
          <div class="d-files gap-3">
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="fylo-card p-4 position-relative">

          <p class="text-white">
            You’ve used <strong>815 GB</strong> of your storage
          </p>

          <div class="progress">
            <div class="progress-bar rounded-4" style="width:81%"><span class="dot"></span></div>
          </div>
          <div class="d-flex justify-content-between text-white mt-2">
            <span>0 GB</span>
            <span>1000 GB</span>
          </div>
          <div class="storage-badge">
            <span class="storage-number">185</span>
            <span class="storage-label">GB LEFT</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
