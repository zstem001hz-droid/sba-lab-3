<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frontend Mentor | ** bootstrapped ** Fylo data storage component</title>

  <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> -->

  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet" href="styles.css">

</head>

<body class="d-flex justify-content-center align-items-center min-vh-100">
  <div class="container pb-4">
    <div class="row g-4 justify-content-center align-items-end">
      <div class="col-md-4">

        <div class="fylo-card logo-card p-4">
          <img src="img/logo.svg" class="fylo-logo mt-2 ms-2 mb-4" alt="Fylo logo">

          <div class="d-flex gap-3">

            <div class="icon-box d-flex justify-content-center align-items-center">
              <img src="img/icon-document.svg" alt="document">
            </div>

            <div class="icon-box d-flex justify-content-center align-items-center">
              <img src="img/icon-folder.svg" alt="folder">
            </div>

            <div class="icon-box d-flex justify-content-center align-items-center">
              <img src="img/icon-upload.svg" alt="upload">
            </div>
          </div>

        </div>
      </div>
      <div class="col-md-7">
        <div class="fylo-card p-4 position-relative">

          <p class="text-white-50 mb-2 fs-6">
            You’ve used <span class="text-white fw-bold">815 GB</span> of your storage
          </p>

          <div class="progress">
            <div class="progress-bar rounded-4" style="width:81%"><span class="dot"></span></div>
          </div>
          <div class="d-flex justify-content-between progress-labels mt-2">
            <span>0 GB</span>
            <span>1000 GB</span>
          </div>
          <div class="storage-badge d-flex align-items-center gap-2">
            <span class="fs-2 fw-bold text-dark">185</span>
            <span class="fs-6 fw-bold text-secondary storage-label">GB LEFT</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
